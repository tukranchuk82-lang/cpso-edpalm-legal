<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emGreen" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B7A4F"/>
      <stop offset="1" stop-color="#0C4A30"/>
    </linearGradient>
    <linearGradient id="emGold" x1="60" y1="50" x2="140" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2D98A"/>
      <stop offset="1" stop-color="#C9A24B"/>
    </linearGradient>
  </defs>

  <!-- Медальон -->
  <circle cx="100" cy="100" r="94" fill="url(#emGreen)"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#emGold)" stroke-width="3"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>

  <!-- Лавровые ветви -->
  <g stroke="url(#emGold)" stroke-width="2.5" fill="none" opacity="0.9" stroke-linecap="round">
    <path d="M44 120 C40 138 50 156 66 166"/>
    <path d="M156 120 C160 138 150 156 134 166"/>
  </g>
  <g fill="url(#emGold)" opacity="0.85">
    <ellipse cx="44" cy="126" rx="4" ry="7" transform="rotate(-30 44 126)"/>
    <ellipse cx="46" cy="140" rx="4" ry="7" transform="rotate(-20 46 140)"/>
    <ellipse cx="52" cy="153" rx="4" ry="7" transform="rotate(-10 52 153)"/>
    <ellipse cx="156" cy="126" rx="4" ry="7" transform="rotate(30 156 126)"/>
    <ellipse cx="154" cy="140" rx="4" ry="7" transform="rotate(20 154 140)"/>
    <ellipse cx="148" cy="153" rx="4" ry="7" transform="rotate(10 148 153)"/>
  </g>

  <!-- Конфедератка (шапочка выпускника) -->
  <g>
    <polygon points="60,72 100,56 140,72 100,88" fill="url(#emGold)" stroke="#9C7A2E" stroke-width="1"/>
    <path d="M82 82 L118 82 L114 99 C108 104 92 104 86 99 Z" fill="url(#emGold)" stroke="#9C7A2E" stroke-width="1"/>
    <circle cx="100" cy="64" r="4" fill="#FBEFC4"/>
    <!-- Кисточка -->
    <path d="M100 64 L132 70 L132 96" stroke="#FBEFC4" stroke-width="2.5" fill="none"/>
    <path d="M132 96 l-4 12 8 0 z" fill="#FBEFC4"/>
  </g>

  <!-- Весы правосудия -->
  <g stroke="url(#emGold)" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="100" y1="106" x2="100" y2="150"/>
    <line x1="72" y1="114" x2="128" y2="114"/>
    <line x1="84" y1="152" x2="116" y2="152"/>
  </g>
  <circle cx="100" cy="106" r="3.5" fill="url(#emGold)"/>
  <!-- Левая чаша -->
  <g stroke="url(#emGold)" stroke-width="1.6" fill="none">
    <line x1="72" y1="114" x2="62" y2="130"/>
    <line x1="72" y1="114" x2="82" y2="130"/>
  </g>
  <path d="M60 130 Q72 144 84 130" fill="url(#emGold)" opacity="0.95"/>
  <!-- Правая чаша -->
  <g stroke="url(#emGold)" stroke-width="1.6" fill="none">
    <line x1="128" y1="114" x2="118" y2="130"/>
    <line x1="128" y1="114" x2="138" y2="130"/>
  </g>
  <path d="M116 130 Q128 144 140 130" fill="url(#emGold)" opacity="0.95"/>
</svg>
