<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0E5A3C" />
  <title>ЦПСО EdPalm — Юридическая поддержка</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/app-icon.svg" />
  <link rel="apple-touch-icon" href="assets/app-icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EdPalm Юрист" />

  <link rel="stylesheet" href="css/styles.css?v=8" />
</head>
<body>
  <!-- Приложение -->
  <div class="screen" id="screen">

      <!-- Плашка демо-режима (тонкая полоса на самом верху) -->
      <div class="demo-badge" id="demoBadge" title="Прототип: backend (DMS, SMS, Omnidesk) имитируется на фронте">
        ПРОТОТИП · демо-режим
      </div>

      <!-- Шапка -->
      <header class="appbar" id="appbar" hidden>
        <button class="appbar__back" id="backBtn" aria-label="Назад" hidden>‹</button>
        <img class="appbar__emblem" src="assets/emblem.svg" alt="" />
        <div class="appbar__title" id="appbarTitle">ЦПСО EdPalm</div>
        <div class="appbar__spacer"></div>
        <button class="appbar__profile" id="profileBtn" aria-label="Профиль">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M5 20 a7 7 0 0 1 14 0"/>
          </svg>
        </button>
      </header>

      <!-- Меню профилей (рендерится из app.js) -->
      <div class="profile-pop" id="profilePop" hidden></div>

      <!-- Контент (рендерится из app.js) -->
      <main class="content" id="content"></main>

      <!-- Нижнее меню -->
      <nav class="tabbar" id="tabbar" hidden>
        <button class="tabbar__btn" data-nav="home">
          <span class="tabbar__icon">
            <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 11 L12 4 L20 11"/><path d="M6 10 V20 H18 V10"/><path d="M10 20 V14 H14 V20"/>
            </svg>
          </span>
          <span class="tabbar__label">Главная</span>
        </button>
        <button class="tabbar__btn" data-nav="cabinet">
          <span class="tabbar__icon">
            <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="7" width="18" height="13" rx="2"/>
              <path d="M8 7 V5.5 A1.5 1.5 0 0 1 9.5 4 h5 A1.5 1.5 0 0 1 16 5.5 V7"/>
              <path d="M3 12.5 H21"/>
            </svg>
            <span class="nav-dot" id="cabinetDot" hidden></span>
          </span>
          <span class="tabbar__label">Кабинет</span>
        </button>
        <button class="tabbar__btn" data-nav="ask">
          <span class="tabbar__icon">
            <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 4 V20"/><path d="M8 20 H16"/><path d="M6 8 H18"/>
              <path d="M6 8 L4 12"/><path d="M6 8 L8 12"/><path d="M3.5 12 a2.5 2 0 0 0 5 0 Z"/>
              <path d="M18 8 L16 12"/><path d="M18 8 L20 12"/><path d="M15.5 12 a2.5 2 0 0 0 5 0 Z"/>
            </svg>
          </span>
          <span class="tabbar__label">Вопрос юристу</span>
        </button>
      </nav>
  </div>

  <!-- Всплывающее уведомление -->
  <div class="toast" id="toast" hidden></div>

  <!-- Модалка: добавить / войти в другой профиль -->
  <div class="modal-overlay modal-overlay--center" id="authModal">
    <div class="modal modal--auth">
      <button class="modal__close" id="authModalClose" aria-label="Закрыть">×</button>
      <div id="authModalBody"></div>
    </div>
  </div>

  <!-- Инструкция установки для iPhone/iPad (Safari) -->
  <div class="modal-overlay" id="iosModal">
    <div class="modal">
      <h3>🎓 Установить на экран «Домой»</h3>
      <ol>
        <li>Нажмите кнопку «Поделиться» <span class="share-ico">⬆️</span> внизу Safari.</li>
        <li>Выберите «На экран “Домой”».</li>
        <li>Нажмите «Добавить» — появится иконка приложения.</li>
      </ol>
      <button class="btn btn--primary" id="iosModalClose">Понятно</button>
    </div>
  </div>

  <script src="js/data.js?v=8"></script>
  <script src="js/app.js?v=8"></script>
</body>
</html>
